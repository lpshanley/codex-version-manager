name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release-please.outputs.releases_created }}
      prs_created: ${{ steps.release-please.outputs.prs_created }}
      pr: ${{ steps.release-please.outputs.pr }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release-please

      # Format files modified by release-please (e.g. package.json version bump)
      - uses: actions/checkout@v4
        if: steps.release-please.outputs.prs_created == 'true'
        with:
          ref: ${{ fromJSON(steps.release-please.outputs.pr).headBranchName }}

      - uses: pnpm/action-setup@v4
        if: steps.release-please.outputs.prs_created == 'true'

      - uses: actions/setup-node@v4
        if: steps.release-please.outputs.prs_created == 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Format and commit
        if: steps.release-please.outputs.prs_created == 'true'
        run: |
          pnpm install --ignore-workspace
          pnpm check:fix
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore: format release files"
          git push

  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --ignore-workspace
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build
      - run: pnpm publish --access public --provenance --no-git-checks
